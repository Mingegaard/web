<style>
  @import url("../fonts.googleapis.com/css2.0a6f8a39.css");

  :root{

    animation: fadeInUp 0.8s ease-out 0.2s forwards;
  }

  @keyframes fadeInUp {
    from {

    to {

    }
  }

  .hand-name{

  }

    line-height: 1.5;
    letter-spacing: 0;
    white-space: pre-wrap;
  }

  #messages {
  
    margin: 0; 
    padding: 20px var(--page-pad) clamp(60px, 8vw, 120px) var(--page-pad);
    
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden; /* 防止横向滚动条 */
    min-height: 0;

    /* 保持原有的遮罩样式不变 */
    --fade-h: 32px;
    -webkit-mask-image: linear-gradient(
      to bottom,
      black 0,                         /* 顶部直接是黑色（完全可见），无模糊 */
      black calc(100% - var(--fade-h)), /* 一直保持可见，直到底部模糊区开始 */
      transparent 100%                  /* 底部渐变透明 */
    );
    
    mask-image: linear-gradient(
      to bottom,
      black 0,
      black calc(100% - var(--fade-h)),
      transparent 100%
    );
  }
  
  #messages::-webkit-scrollbar {
    width: 0;
  }

  #messages.scrolling::-webkit-scrollbar {
    width: 2px;
  }
  #messages.scrolling::-webkit-scrollbar-track {
    background: transparent;
  }
  #messages.scrolling::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.1);
    border-radius: 3px;

  }
  #messages.scrolling::-webkit-scrollbar-thumb:active {
    background: rgba(0, 0, 0, 0.2);
  }
  
  .row{

  	opacity: 0;

  	align-items: flex-start; /* 头像顶对齐 */
  	gap: 12px;
  
  	/* 关键：当作头像 absolute 的参考容器 */
  	position: relative;
  
  	/* 覆盖之前的 52px 内边距，让气泡贴到 messages 的内边缘 */
  	padding-left: 0;
  	padding-right: 0;
	}

  
  .row:first-child {
    animation-delay: 0.6s;
  }
  
  .row.user{ 
    justify-content: flex-end; 
  }
   .avatar {
  	width: 40px;
  	height: 40px;
  	border-radius: 50%;
  	object-fit: cover;
  	flex-shrink: 0;
  	margin-top: 2px;
  	background: #e0e0e0;

  /* 关键：从 flex 流里拿出来 */
  	position: absolute;
	}
  /* 左侧（AI）消息：头像往左探出去 */
	.row:not(.user) .avatar {
  	left: -52px;   /* 刚好抵消 padding-left */
	}

	/* 右侧（用户）消息：头像往右探出去 */
	.row.user .avatar {
  	right: -52px;  /* 抵消 padding-right */

    letter-spacing: 0;

  }

    :root {
      --maxw: 90vw;

  function renderMarkdown(src){ let blocks=[]; src=src.replace(/```([\s\S]*?)```/g,(_,c)=>{blocks.push(c);return `\uE000${blocks.length-1}\uE000`;}); let inl=[]; src=src.replace(/`([^`\n]+)`/g,(_,c)=>{inl.push(c);return `\uE001${inl.length-1}\uE001`;}); src=esc(src); src=src.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="./_2.html" target="_blank" rel="noopener noreferrer">$1</a>'); src=src.replace(/^(#{1,6})\s*(.+)$/gm,(_,h,t)=>`<h${h.length}>${t}</h${h.length}>`); src=src.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'); src=src.replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>'); src=src.replace(/((?:^|\n)(?:\d+\.\s.+(?:\n|$))+)/g,b=>{ const items=b.trim().split(/\n/).filter(Boolean).map(l=>l.replace(/^\d+\.\s+/,'')).map(t=>`<li>${t}</li>`).join(''); return `<ol>${items}</ol>`; }); src=src.replace(/((?:^|\n)(?:[-*]\s.+(?:\n|$))+)/g,b=>{ const items=b.trim().split(/\n/).filter(Boolean).map(l=>l.replace(/^[-*]\s+/,'')).map(t=>`<li>${t}</li>`).join(''); return `<ul>${items}</ul>`; }); src=src.replace(/(^|[\n])(?!<h\d>|<ul>|<ol>|<\/ul>|<\/ol>|<\/li>|<pre>|<p>)([^\n][\s\S]*?)(?=(\n\n|$))/g,(_,pfx,para)=>`${pfx}<p>${para.replace(/\n/g,'<br>')}</p>`); src=src.replace(/\uE001(\d+)\uE001/g,(_,i)=>`<code>${esc(inl[+i])}</code>`); src=src.replace(/\uE000(\d+)\uE000/g,(_,i)=>`<pre><code>${esc(blocks[+i])}</code></pre>`); src=src.replace(/((https?:\/\/)[^\s<]+)(?![^<]*>)/g,'<a href="./_1.html" target="_blank" rel="noopener noreferrer">$1</a>'); return src; }

  /**
   * ✅ THIS IS THE UPDATED FUNCTION ✅

   * @param {string} text - 要逐字显示的文本
   * @param {object} options - 包含延迟配置的对象
   * @param {number} options.baseDelay - 每个词后的基础延迟（毫秒）
   * @param {number} options.jitter - 随机延迟范围，让停顿更自然
   * @param {number} options.punctuationPause - 遇到标点时的额外延迟
   */
  async function* streamText(text, options = {}) {
    // 默认配置，可以按需调整
    const { baseDelay = 70, jitter = 40, punctuationPause = 50 } = options;
    
    // 使用正则表达式按空格分割，并过滤掉可能产生的空字符串
    const words = text.split(/\s+/).filter(Boolean);

    for (let i = 0; i < words.length; i++) {
      const word = words[i];

      // 先输出一个空格（如果不是第一个词）
      if (i > 0) {
        yield ' ';
      }
      // 再输出单词本身
      yield word;

      // --- 计算本次停顿的时长 ---
      // 1. 基础延迟
      let currentDelay = baseDelay;

      // 2. 增加随机抖动，使其不均匀

      // 3. 如果单词以常见标点结尾，增加额外停顿
      if (/[.,;!?]$/.test(word)) {
        currentDelay += punctuationPause;
      }

      // 等待计算出的时长
      await new Promise(resolve => setTimeout(resolve, Math.max(0, currentDelay)));
    }
  }

    }

  }
