<style>
  @import url("../fonts.googleapis.com/css2.0a6f8a39.css");

  :root {

    background: #fafafa;

  }

  /* 整个开场白区域容器 */
  #hero-chat-intro {
    width: 100%;
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 40px var(--page-pad) 0px; 
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;

  }

  }

  /* 单条对话行 */
  .intro-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    opacity: 1;
    animation:none;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* 头像样式（AI 在左侧） */
  .intro-avatar {
    width: 40px;

    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;

  }

  /* 气泡样式 */
  .intro-msg {

    padding: 12px 16px;

    background: #f8f8f8;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    font-family: "Satoshi Variable", Inter, system-ui, -apple-system, Arial, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    font-size: var(--text-size);
    line-height: 1.6;
    color: rgba(17, 17, 17, 0.85);
  }

</style>

<script>
  // AI 头像地址（沿用你现在的）
  const AI_AVATAR_URL = "../cdn.prod.website-files.com/6805a5ac2316d13791f78cb3/6930fa67fe4f90044ed0764d_ai avatar.png";

  // 打字内容（可以之后改）
  const WELCOME_TEXT = "I am an enthusiast of extreme and outdoor sports. I have successfully summited the 6,178-meter Yuzhu Peak, completed a 2,200-kilometer cycling journey along the Sichuan-Tibet Highway in 21 days, and experienced skydiving from an altitude of 12,000 feet. This summer, I plan to climb the 7,546-meter Muztagh Ata. Feel free to join me for extreme adventures and outdoor activities!";

  // 按词打字的生成器
  async function* streamText(text, options = {}) {
    const { baseDelay = 70, jitter = 40, punctuationPause = 50 } = options;
    const words = text.split(/\s+/).filter(Boolean);

    for (let i = 0; i < words.length; i++) {
      const word = words[i];
      if (i > 0) {
        yield " ";
      }
      yield word;

      let currentDelay = baseDelay + (Math.random() - 0.5) * jitter;
      if (/[.,;!?]$/.test(word)) {
        currentDelay += punctuationPause;
      }
      await new Promise(r => setTimeout(r, Math.max(0, currentDelay)));
    }
  }

  // 把流输出到指定气泡元素里
  async function displayStreamedText(el, streamSource) {
    let full = "";
    const caret = document.createElement("span");
    caret.className = "typing-caret";

    for await (const chunk of streamSource) {
      full += chunk;
      el.textContent = full;
      el.appendChild(caret);
    }

    // 结束后去掉光标
    caret.remove();
  }

  document.addEventListener("DOMContentLoaded", () => {
    const container = document.getElementById("intro-messages");
    if (!container) return;

    // 创建一行：头像 + 气泡
    const row = document.createElement("div");
    row.className = "intro-row";

    const avatar = document.createElement("img");
    avatar.className = "intro-avatar";
    avatar.src = AI_AVATAR_URL;
    avatar.alt = "AI avatar";

    const msg = document.createElement("div");
    msg.className = "intro-msg";

    row.appendChild(avatar);
    row.appendChild(msg);
    container.appendChild(row);

    // 稍微延迟一下开始打字
    setTimeout(() => {
      displayStreamedText(msg, streamText(WELCOME_TEXT));
    }, 100);
  });
